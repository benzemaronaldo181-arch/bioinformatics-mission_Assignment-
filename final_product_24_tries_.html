<script>
const db={
    10:["[MPM2D] Math","[SNC2D] Science","[ENG2D] English","[ICS2O] CS","[CHC2D] History","[GLC2O] Careers","[CHV2O] Civics","[PPL2O] Gym","[CGC1D] Geography"],
    11:["[MCR3U] Functions","[SBI3U] Biology","[SCH3U] Chemistry","[SPH3U] Physics","[ICS3U] CS","[ENG3U] English","[HSP3U] Psych","[BAF3M] Acct", "[CGC1D] Geography"],
    12:["[MHF4U] Adv Func","[MCV4U] Calc","[ENG4U] English","[SCH4U] Chem","[SPH4U] Phys","[ICS4U] CS","[SBI4U] Bio","[PSK4U] Kinesiology"],
    uni:["[SYSC 2006] C++ Programming","[MATH 1004] Calculus I","[BIOL 1103] Biology I","[PHYS 1004] Electromagnetism","[CHEM 1101] Chemistry II","[BIOM 2007] Medical Instrumentation","[COMP 3005] Database Systems"],
    spec:["[SYSC 5104] Discrete-Event Modeling","[BIOM 5405] Pattern Classification","[COMP 5900] ML for Bioinformatics","[BIOL 5501] Genomic Data Studies","[BIOM 5906] Master's Thesis"],
    work:["Project Alpha: DNA Mapping","Project Beta: Pathogen Modeling","Project Gamma: Neural Interface","Project Delta: Clinical Trial"]
};

let state={name:"",phase:"HS",year:10,avg:82,stress:0,salary:0,raiseCounter:0,isSpec:false,selected:[]};

function startGame(){
    state.name=document.getElementById('pName').value||"User";
    document.getElementById('h-name').innerText=state.name;
    document.getElementById('hud').style.display="grid";
    loadPhase();
}

function loadPhase(){
    state.selected=[];
    let l=document.getElementById('c-list');
    l.innerHTML="";
    let s=(state.phase==="HS")?db[state.year]:(state.phase==="UNI"?db.uni:(state.phase==="SPEC"?db.spec:db.work));
    let t=(state.phase==="HS")?(state.year===12?7:8):(state.phase==="WORK"?4:5);
    document.getElementById('c-title').innerText=`${state.phase} ${state.phase==="WORK"?"YEAR "+state.year:"REGISTRATION"}`;
    
    s.forEach(c=>{
        let d=document.createElement('div');
        d.className="course-item";
        d.innerText=c;
        d.onclick=()=>{
            if(d.classList.contains('selected')){
                d.classList.remove('selected');
                state.selected=state.selected.filter(x=>x!==c);
            }else if(state.selected.length<t){
                d.classList.add('selected');
                state.selected.push(c);
            }
            document.getElementById('c-tracker').innerText=`Selected: ${state.selected.length} / ${t}`;
        };
        l.appendChild(d);
    });
    show('scr-courses');
}

function submitCourses(){
    let t=(state.phase==="HS")?(state.year===12?7:8):(state.phase==="WORK"?4:5);
    if(state.selected.length<t) return alert("Select full workload.");
    
    let o=document.getElementById('wl-options');
    o.innerHTML="";
    const st=[
        {n:"Scholar",m:6,s:15,d:"Pure focus."},
        {n:"Athlete",m:2,s:-10,d:"Active recovery."},
        {n:"Socialite",m:-2,s:-20,d:"Mental break."},
        {n:"Slacker",m:-10,s:-30,d:"Max recovery."}
    ];
    
    st.forEach(s=>{
        let b=document.createElement('div');
        b.className="choice-btn";
        b.innerHTML=`<b>${s.n}:</b> Mark/Perf ${s.m>0?'+':''}${s.m}%, Stress ${s.s>0?'+':''}${s.s}%<br><small style="color:#8b949e">${s.d}</small>`;
        b.onclick=()=>applyLogic(s.m,s.s);
        o.appendChild(b);
    });
    show('scr-worklife');
}

function applyLogic(m,s){
    state.stress = Math.min(100, Math.max(0, state.stress + s));
    let p = 0;
    if (state.stress > 40) {
        p = Math.floor((state.stress - 40) / 10) * 2; 
    }
    state.avg = Math.min(100, Math.max(0, state.avg + m - p));
    
    if(state.phase==="WORK"){
        if(state.avg>=85) state.raiseCounter++;
        else state.raiseCounter=0;
        
        if(state.raiseCounter>=2){ // Promotion every 2 years of high performance
            let cap=state.isSpec?190000:135000;
            if(state.salary<cap){
                state.salary+=15000;
                if(state.salary>cap)state.salary=cap;
                alert(`PROMOTION! New Salary: $${state.salary.toLocaleString()}`);
            }
            state.raiseCounter=0;
        }
    }
    
    updateHUD();
    
    if(state.stress>=100) return triggerFail("BURNOUT.");
    if(state.avg<60) return triggerFail(state.phase==="WORK"?"FIRED.":"ACADEMIC FAIL.");
    
    if(state.phase==="HS"){
        if(state.year<12){
            state.year++;
            loadPhase();
        } else {
            document.getElementById('final-avg-val').innerText=state.avg.toFixed(1)+"%";
            show('scr-uni-select');
        }
    } else if(state.phase==="UNI"){
        if(state.year<4){
            state.year++;
            loadPhase();
        } else {
            triggerSpecFork();
        }
    } else if(state.phase==="SPEC"){
        // Finish Specialization -> Start as a Junior Specialist at $90k
        startWork(90000,true);
    } else {
        if(state.year<10){
            state.year++;
            loadPhase();
        } else {
            triggerWin();
        }
    }
}

function processUni(){
    let c=document.getElementById('uni-choice').value;
    let r=Math.random();
    let a=false;
    
    if(c==="carleton") a=(state.avg>=88||(state.avg>=85&&r>.5));
    if(c==="toronto") a=(state.avg>=94||(state.avg>=90&&r>.5));
    if(c==="waterloo") a=(state.avg>=97||(state.avg>=93&&r>.5));
    
    if(a){
        alert("ADMITTED");
        state.phase="UNI";
        state.year=1;
        state.avg=75;
        state.stress=0;
        updateHUD();
        loadPhase();
    } else {
        triggerFail("REJECTED.");
    }
}

function triggerSpecFork(){
    document.getElementById('res-title').innerText="GRADUATION";
    document.getElementById('res-content').innerHTML=`
        <p>You have graduated! Your choice defines your start:</p>
        <button onclick=\"startWork(65000,false)\">Junior Bio-Tech ($65k Start)</button>
        <button onclick=\"startSpecialization()\" style=\"margin-top:10px\">Master's Specialty ($0 - Higher Cap)</button>
    `;
    show('scr-result');
}

function startSpecialization() {
    state.phase="SPEC";
    state.year="MASTERS";
    state.salary=0; 
    state.stress=15; 
    state.avg=85;
    updateHUD();
    loadPhase();
}

function startWork(b,i){
    state.phase="WORK";
    state.year=1;
    state.salary=b; 
    state.isSpec=i;
    state.avg=80;
    state.stress=0;
    updateHUD();
    loadPhase();
}

function triggerFail(m){
    document.getElementById('res-title').innerText="FAILED";
    document.getElementById('res-content').innerText=m;
    document.getElementById('res-btn').onclick=()=>location.reload();
    show('scr-result');
}

function triggerWin(){
    document.getElementById('res-title').innerText="SUCCESS";
    document.getElementById('res-content').innerHTML=`Final Career Salary: $${state.salary.toLocaleString()}<br>Top Tier Professional: ${state.name}`;
    show('scr-result');
}

function updateHUD(){
    document.getElementById('h-year').innerText=state.year;
    document.getElementById('h-avg').innerText=state.avg.toFixed(1)+"%";
    document.getElementById('h-stress').innerText=state.stress+"%";
    document.getElementById('h-sal').innerText=state.salary.toLocaleString();
    document.getElementById('h-path').innerText=state.phase;
}

function show(i){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(i).classList.add('active');
}
</script>
